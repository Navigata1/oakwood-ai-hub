const dec=new TextDecoder();
function b64bytes(s){return Uint8Array.from(atob(s),c=>c.charCodeAt(0));}
async function derive(password){
  const material=await crypto.subtle.importKey('raw',new TextEncoder().encode(password),'PBKDF2',false,['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt:b64bytes(payload.salt),iterations:payload.iter,hash:'SHA-256'},material,{name:'AES-GCM',length:256},false,['decrypt']);
}
async function unlock(password){
  const key=await derive(password);
  const packed=b64bytes(payload.data), data=packed.slice(0,-16), tag=packed.slice(-16);
  const combined=new Uint8Array(data.length+tag.length); combined.set(data); combined.set(tag,data.length);
  const plain=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64bytes(payload.iv)},key,combined);
  return dec.decode(plain);
}
document.getElementById('form').addEventListener('submit',async e=>{
  e.preventDefault();
  const btn=document.getElementById('btn'), err=document.getElementById('err'), loading=document.getElementById('loading'), pw=document.getElementById('pw');
  err.style.display='none'; loading.style.display='block'; btn.disabled=true;
  try{
    const html=await unlock(pw.value);
    document.open(); document.write(html); document.close();
  }catch(_e){
    loading.style.display='none'; btn.disabled=false; pw.value=''; pw.focus(); err.style.display='block';
  }
});
